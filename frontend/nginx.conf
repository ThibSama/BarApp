server {
  listen 80 default_server;
  # One server block serves every hostname from the single compiled SPA bundle:
  # the two role-specific loopback hosts, plain localhost, and — via the `_`
  # catch-all — any LAN IP used for two-device demos. The Vue app itself picks
  # the client/barmaker/legacy route layout from window.location.hostname, so no
  # per-host Nginx branching or duplicated build is required.
  server_name client.localhost barmaker.localhost localhost _;
  root /usr/share/nginx/html;
  index index.html;

  # Reverse-proxy the backend API. The browser only ever talks to this Nginx
  # (same origin), so it never needs a Docker-internal hostname and there is no
  # cross-origin call. Requests under /api are forwarded, path preserved, to the
  # Compose "api" service. The api container is started after its healthcheck
  # passes (compose depends_on), so the upstream name resolves at Nginx startup.
  location /api/ {
    proxy_pass http://api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # API responses must never be cached as immutable static assets.
    proxy_no_cache     1;
    proxy_cache_bypass 1;
    add_header Cache-Control "no-store" always;
  }

  # Vue Router SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-lived caching for fingerprinted static assets.
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
