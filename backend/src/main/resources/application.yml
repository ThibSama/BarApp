spring:
  application:
    name: barapp-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:barapp}
    username: ${DB_USER:barapp}
    password: ${DB_PASSWORD:barapp}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Never let Hibernate create or mutate the schema; Flyway owns the schema.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${SERVER_PORT:8080}
  error:
    # Do not expose stack traces or internal messages in error responses.
    include-stacktrace: never
    include-message: never

logging:
  level:
    org.flywaydb: info

app:
  jwt:
    # HMAC secret of at least 256 bits. REQUIRED: no default is provided here.
    # Set APP_JWT_SECRET in the environment or in a profile-specific YAML.
    # application-local.yml supplies a development-only secret for local dev.
    secret: ${APP_JWT_SECRET}
    issuer: ${APP_JWT_ISSUER:le-barapp}
    expiration-seconds: ${APP_JWT_EXPIRATION_SECONDS:3600}
  cors-allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
